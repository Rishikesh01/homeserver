services:
  wg-easy:
    image: ghcr.io/wg-easy/wg-easy:14
    container_name: wg-easy
    restart: unless-stopped
    # All config comes from .env. env_file passes values literally, which avoids
    # the classic PASSWORD_HASH "$" interpolation trap.
    env_file: .env
    ports:
      - "51820:51820/udp"          # WireGuard tunnel — forward this UDP port on the router
      - "51821:51821/tcp"          # Web admin UI (keep on the LAN; do NOT forward)
    volumes:
      - wg-data:/etc/wireguard
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv4.conf.all.src_valid_mark=1

volumes:
  wg-data:
