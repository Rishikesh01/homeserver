services:
  caddy:
    image: caddy:2.8-alpine
    container_name: caddy
    restart: unless-stopped
    ports:
      - "80:80"                                                  # CA download (http)
      - "${VAULT_HTTPS:-8443}:${VAULT_HTTPS:-8443}"              # Vaultwarden (https)
      - "${CLOUD_HTTPS:-8444}:${CLOUD_HTTPS:-8444}"              # Nextcloud (https)
      - "${PIHOLE_HTTPS:-8445}:${PIHOLE_HTTPS:-8445}"            # Pi-hole (https)
      - "${HOME_HTTPS:-443}:${HOME_HTTPS:-443}"                  # dashboard (https, port 443 = no :port in URL)
    # Lets Caddy reach the services on the host's published ports.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ACME_EMAIL: ${ACME_EMAIL:-you@example.com}
      # Server LAN IP — used as the cert SAN so https://<ip>:<port> is trusted.
      SERVER_IP: ${SERVER_IP}
      VAULT_UPSTREAM: ${VAULT_UPSTREAM}
      CLOUD_UPSTREAM: ${CLOUD_UPSTREAM}
      PIHOLE_UPSTREAM: ${PIHOLE_UPSTREAM}
      # The hsctl web UI on the host (bind it to :8088 so this gateway can reach it).
      HOME_UPSTREAM: ${HOME_UPSTREAM:-host.docker.internal:8088}
      # HTTPS ports each app is exposed on (must match services.json on the dashboard).
      VAULT_HTTPS: ${VAULT_HTTPS:-8443}
      CLOUD_HTTPS: ${CLOUD_HTTPS:-8444}
      PIHOLE_HTTPS: ${PIHOLE_HTTPS:-8445}
      HOME_HTTPS: ${HOME_HTTPS:-443}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data       # issued certs + local CA root — back this up
      - caddy-config:/config

volumes:
  caddy-data:
  caddy-config:
