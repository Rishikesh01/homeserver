services:
  it-tools:
    # 100+ web utilities: converters, image<->base64, QR, hashes, formatters, etc.
    # Pin to a dated tag after first pull (tags look like 2024.x.y-<sha>).
    image: ghcr.io/corentinth/it-tools:latest
    container_name: it-tools
    restart: unless-stopped
    ports:
      - "${ITTOOLS_PORT:-8091}:80"
