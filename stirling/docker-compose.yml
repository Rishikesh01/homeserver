services:
  stirling-pdf:
    # Self-hosted PDF toolkit: compress to size, merge/split, images<->PDF, OCR, etc.
    image: ghcr.io/stirling-tools/stirling-pdf:2.12.0
    container_name: stirling-pdf
    restart: unless-stopped
    ports:
      - "${STIRLING_PORT:-8090}:8080"
    environment:
      DISABLE_ADDITIONAL_FEATURES: "true"   # lighter; flip on for OCR/extra tools
      LANG: en_US.UTF-8
    volumes:
      - stirling-config:/configs
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  stirling-config:
